aid: mock-service-worker
name: Mock Service Worker
description: >-
  Mock Service Worker (MSW) is an industry-standard, open-source API mocking
  library for the browser and Node.js. MSW intercepts outgoing requests at the
  network level using Service Workers in browsers and a request interception
  algorithm in Node.js, allowing developers to write client-agnostic mocks for
  HTTP, GraphQL, WebSocket, and Server-Sent Events and reuse them across any
  framework, tool, or environment for development, testing, and debugging.
