apis:
  - aid: mock-service-worker:msw
    name: Mock Service Worker
    description: >-
      Mock Service Worker (MSW) is an open-source library for mocking REST,
      GraphQL, WebSocket, and Server-Sent Events APIs at the network level. It
      provides setupWorker for browser environments and setupServer for Node.js,
      with handlers (http, graphql, ws, sse) that allow developers to declare
      mocked responses without modifying application code.
